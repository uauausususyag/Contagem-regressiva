<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Açaí da Andreia</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#4b0082;
    color:white;
}

header{
    text-align:center;
    background:#6a0dad;
    padding:30px 20px;
}

.logo{
    width:250px;
    max-width:90%;
    border-radius:20px;
    margin-bottom:15px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    font-size:20px;
}

.banner{
    text-align:center;
    padding:50px 20px;
}

.banner h2{
    font-size:32px;
    margin-bottom:15px;
}

.banner p{
    font-size:18px;
}

.produtos{
    padding:40px 20px;
    text-align:center;
}

.produtos h2{
    margin-bottom:30px;
}

.card{
    background:#6a0dad;
    max-width:350px;
    margin:20px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    font-size:22px;
    margin-bottom:20px;
}

.botao{
    display:inline-block;
    background:#ff69b4;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:10px;
    font-weight:bold;
}

.botao:hover{
    opacity:0.9;
}

footer{
    background:#2d004d;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>
<body>

<header>
    <img class="logo"
    src="https://i.ibb.co/qYxYxVv9/file-000000009f64720eba56b76d10ae316f.png"
    alt="Açaí da Andreia">

    <h1>🍇 Açaí da Andreia 🍇</h1>
    <p>Sabor que conquista!</p>
</header>

<section class="banner">
    <h2>O Melhor Açaí da Cidade</h2>
    <p>Natural, cremoso e cheio de sabor.</p>
</section>

<section class="produtos">
    <h2>Nossos Tamanhos</h2>

    <div class="card">
        <h3>🥤 Açaí 300ml</h3>
        <p>R$ 10,00</p>
        <a class="botao"
        href="https://wa.me/5584994562794?text=ola+vim+pelo+açai+de+300ml">
        Comprar
        </a>
    </div>

    <div class="card">
        <h3>🥤 Açaí 500ml</h3>
        <p>R$ 15,00</p>
        <a class="botao"
        href="https://wa.me/5584994562794?text=ola+vim+pelo+açai+de+500ml">
        Comprar
        </a>
    </div>

    <div class="card">
        <h3>🥤 Açaí 700ml</h3>
        <p>R$ 20,00</p>
        <a class="botao"
        href="https://wa.me/5584994562794?text=ola+vim+pelo+açai+de+700ml">
        Comprar
        </a>
    </div>

</section>

<footer>
    <p>© 2026 Açaí da Andreia</p>
    <p>WhatsApp: (84) 9170-9023</p>
</footer>

</body>
</html>
