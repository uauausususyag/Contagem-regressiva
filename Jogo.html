<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CitySquad</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#121212;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:500px;
    background:#1e1e1e;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,.5);
}

h1{
    color:#00ff88;
}

button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    background:#00b894;
    color:white;
}

button:hover{
    background:#00d39c;
}

#conteudo{
    display:none;
    margin-top:20px;
    text-align:left;
    background:#2a2a2a;
    padding:15px;
    border-radius:10px;
}

h2{
    color:#00ff88;
}

hr{
    border:1px solid #444;
}
</style>
</head>
<body>

<div class="card">
    <h1>🎮 CitySquad</h1>

    <button onclick="mostrarIP()">🌐 Ver IP</button>
    <button onclick="mostrarComandos()">📦 Ver Comandos</button>

    <div id="conteudo"></div>
</div>

<script>
function mostrarIP(){
document.getElementById("conteudo").style.display="block";
document.getElementById("conteudo").innerHTML=`
<h2>🌐 IP do Servidor</h2>

<b>IP:</b><br>
citysquad.hopto.org

<br><br>

<b>Porta:</b><br>
4285
`;
}

function mostrarComandos(){
document.getElementById("conteudo").style.display="block";
document.getElementById("conteudo").innerHTML=`
<h2>📦 Sistema de Caixas</h2>

<b>🟢 /caixa inicial</b><br>
Cooldown: <b>20 dias</b><br>
Recompensas:
<ul>
<li>Capacete de Ferro</li>
<li>Peitoral de Ferro</li>
<li>Escudo</li>
<li>5 Diamantes</li>
</ul>

<hr>

<b>🔵 /caixa pro</b><br>
Cooldown: <b>60 dias</b><br>
Recompensas:
<ul>
<li>Capacete de Diamante</li>
<li>Peitoral de Diamante</li>
<li>Calças de Diamante</li>
<li>Botas de Diamante</li>
<li>Maçã Dourada</li>
<li>Picareta de Netherite</li>
</ul>

<hr>

<b>🔴 /caixa op</b><br>
Cooldown: <b>90 dias</b><br>
Recompensas:
<ul>
<li>Capacete de Netherite</li>
<li>Peitoral de Netherite</li>
<li>Calças de Netherite</li>
<li>Botas de Netherite</li>
<li>Espada de Netherite</li>
<li>Totem da Imortalidade</li>
<li>Maçã Encantada</li>
</ul>
`;
}
</script>

</body>
</html>
